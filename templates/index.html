<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Student Management System</h1>
    <a href="/add">Add New Student</a>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Roll No</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
        {% for s in students %}
        <tr>
            <td>{{s[0]}}</td>
            <td>{{s[1]}}</td>
            <td>{{s[2]}}</td>
            <td>{{s[3]}}</td>
            <td>
                <a href="/delete/{{s[0]}}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
